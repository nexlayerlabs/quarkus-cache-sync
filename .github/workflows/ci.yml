name: CI / Publish to Maven Central

on:
  push:
    branches: [ main ]
    tags:    [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Build + Test (runs on every push and PR)
  # ─────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build (all modules, skip tests)
        run: mvn clean install -DskipTests -B

      - name: Run integration tests (Docker + Testcontainers)
        run: mvn verify -B
        # Docker is available by default on ubuntu-latest runners.
        # Quarkus DevServices will auto-start a Redis container.

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"

  # ─────────────────────────────────────────────────────────
  # Job 2: Publish to Maven Central (only on version tags)
  # ─────────────────────────────────────────────────────────
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21 with Sonatype settings
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase:  MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn clean deploy -P release -DskipTests -B
        env:
          MAVEN_USERNAME:      ${{ secrets.SONATYPE_USERNAME }}
          MAVEN_PASSWORD:      ${{ secrets.SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
