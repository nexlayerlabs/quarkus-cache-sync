# Integration test application.properties
# Quarkus DevServices automatically starts a Redis container (Docker required).
# No manual Redis setup needed for local testing.

quarkus.application.name=cache-sync-integration-tests
quarkus.http.test-port=0

# DevServices: Quarkus auto-starts Redis via Testcontainers.
# Set to false only if you want to point at a real Redis instead.
quarkus.redis.devservices.enabled=true
quarkus.redis.devservices.image-name=redis:7-alpine

# Pod Cache configuration (points to DevServices Redis automatically)
quarkus.cache.sync.host=${quarkus.redis.devservices.host:localhost}
quarkus.cache.sync.port=${quarkus.redis.devservices.port:6379}
quarkus.cache.sync.default-ttl=60
quarkus.cache.sync.enable-metrics=true
quarkus.cache.sync.fallback-enabled=true
quarkus.cache.sync.warmup.enabled=true

# Logging
quarkus.log.level=WARN
quarkus.log.category."io.github.nexlayerlabs".level=DEBUG
